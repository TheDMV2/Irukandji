<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Irukandji Image Optimizer</title>
    <style>
        .section {
            margin-bottom: 2rem;
        }
        .section h3 {
            margin-bottom: 0.75rem;
            margin-top: 0;
            font-size: 1.1rem;
        }
        .field {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
        }
        .field label {
            margin-bottom: 0.25rem;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .field small {
            font-size: 0.8rem;
            color: #999;
            margin-top: 0.25rem;
        }
        .checkbox-field {
            display: flex;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .checkbox-field input {
            margin-right: 0.75rem;
        }
        .stats-container {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.1);
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .usage-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin: 0.5rem 0;
        }
        .usage-fill {
            height: 100%;
            background: #1e88e5;
            transition: width 0.3s ease;
        }
        .loading {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="configContainer">
        <!-- Cache Settings -->
        <div class="section">
            <h3>Cache</h3>
            <div class="checkbox-field">
                <input type="checkbox" id="enableCache" />
                <label for="enableCache">Enable image cache</label>
            </div>
            <div class="field">
                <label for="maxCacheSizeMb">Maximum cache size (MB)</label>
                <input type="number" id="maxCacheSizeMb" min="64" max="4096" value="256" />
                <small id="cacheSizeHint">Suggested: 256 MB (adjust based on available memory)</small>
            </div>
        </div>

        <!-- Compression Settings -->
        <div class="section">
            <h3>Compression</h3>
            <div class="field">
                <label for="targetQuality">Target image quality (1-100)</label>
                <input type="number" id="targetQuality" min="1" max="100" value="76" />
                <small>Recommended range: 20-66 for lossy formats</small>
            </div>
        </div>

        <!-- Startup Settings -->
        <div class="section">
            <h3>Startup</h3>
            <div class="checkbox-field">
                <input type="checkbox" id="enablePreWarm" />
                <label for="enablePreWarm">Enable startup pre-warming</label>
            </div>
        </div>

        <!-- Stats -->
        <div class="section">
            <h3>Cache Statistics</h3>
            <div id="statsContainer" class="stats-container">
                <div class="stat-row">
                    <span>Cache Size</span>
                    <span id="totalSizeMb" class="loading">Loading...</span>
                </div>
                <div class="usage-bar">
                    <div id="usageFill" class="usage-fill" style="width: 0%"></div>
                </div>
                <div class="stat-row">
                    <span>Hit Ratio</span>
                    <span id="ratio" class="loading">Loading...</span>
                </div>
                <div class="stat-row">
                    <span>Cached Items</span>
                    <span id="fileCount" class="loading">Loading...</span>
                </div>
                <div class="stat-row">
                    <span>Total Hits</span>
                    <span id="hits" class="loading">Loading...</span>
                </div>
                <div class="stat-row">
                    <span>Total Misses</span>
                    <span id="misses" class="loading">Loading...</span>
                </div>
            </div>
        </div>

        <!-- Save Button -->
        <div style="margin-top: 2rem;">
            <button id="saveBtn" style="padding: 0.5rem 1rem; border-radius: 4px; border: none; background: #1e88e5; color: white; cursor: pointer;">
                Save Settings
            </button>
        </div>
    </div>

    <script src="configPage.js"></script>
</body>
</html>
